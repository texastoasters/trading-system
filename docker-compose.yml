# docker-compose.yml
# Trading system infrastructure: Redis, TimescaleDB, and Phoenix LiveView dashboard
# Place this in ~/trading-system/ on your VPS
#
# Dashboard access: served via Tailscale on port 4000 (443 is reserved for OpenClaw).
# Run once on the host after first `docker compose up`:
#   sudo tailscale serve --bg --https=4000 http://localhost:4000
# Then access at https://openboog.<tailnet>.ts.net:4000 from any device on your tailnet.

# Load variables from ~/.trading_env for ${VAR} interpolation throughout this file.
# Docker Compose strips `export` and quotes automatically.
# required: false so this works on dev machines without the file.
services:
  redis:
    image: redis:7-alpine
    container_name: trading_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  timescaledb:
    image: timescale/timescaledb:2.18.0-pg17
    container_name: trading_timescaledb
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: "${TSDB_PASSWORD:-changeme_in_env_file}"
      POSTGRES_DB: trading
      TIMESCALEDB_TELEMETRY: "off"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading"]
      interval: 10s
      timeout: 3s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: trading_dashboard
    restart: unless-stopped
    ports:
      # Bound to loopback only — Tailscale serve proxies from outside
      - "127.0.0.1:4000:4000"
    environment:
      # Phoenix runtime
      PHX_SERVER: "true"
      PORT: "4000"
      # Set to your Tailscale hostname: run `tailscale status` to find it
      # e.g. openboog.tail1234.ts.net or just openboog if MagicDNS is enabled
      PHX_HOST: "${TAILSCALE_HOSTNAME:-localhost}"
      SECRET_KEY_BASE: "${DASHBOARD_SECRET_KEY_BASE}"
      # Database — uses Docker service name, not localhost
      DATABASE_URL: "ecto://trader:${TSDB_PASSWORD:-changeme_in_env_file}@timescaledb:5432/trading"
      # Redis — uses Docker service name, not localhost
      REDIS_URL: "redis://redis:6379"
      # Alpaca (for market clock and account data)
      ALPACA_API_KEY: "${ALPACA_API_KEY}"
      ALPACA_SECRET_KEY: "${ALPACA_SECRET_KEY}"
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - ${HOME}/trading-system/logs:/app/logs:ro
      - /var/log:/var/log/host:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  redis_data:
  timescaledb_data:
