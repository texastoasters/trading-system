# Trading system logrotate config
# Install on VPS: sudo cp scripts/logrotate.conf /etc/logrotate.d/trading-system
# Verify: sudo logrotate --debug /etc/logrotate.d/trading-system

# Static-name logs: screener, supervisor, docker redirectors
# These accumulate indefinitely without rotation
/home/linuxuser/trading-system/logs/screener.log
/home/linuxuser/trading-system/logs/supervisor.log
/home/linuxuser/trading-system/logs/docker_redis.log
/home/linuxuser/trading-system/logs/docker_timescaledb.log
/home/linuxuser/trading-system/logs/docker_dashboard.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y-%m-%d
}

# Dated-name logs: executor, portfolio_manager, watcher (already roll daily by naming)
# Logrotate handles cleanup of old files only — no rotation needed
/home/linuxuser/trading-system/logs/executor_*.log
/home/linuxuser/trading-system/logs/portfolio_manager_*.log
/home/linuxuser/trading-system/logs/watcher_*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
