name: Deploy

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tag:
    name: Tag release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the exact commit that triggered the Tests workflow,
          # not whatever HEAD is at when this workflow fires.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          VERSION=$(cat VERSION)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "refs/tags/v${VERSION}"; then
            echo "Tag v${VERSION} already exists — skipping"
          else
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
            git push origin "v${VERSION}"
            echo "Tagged v${VERSION}"
          fi

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [tag]
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              linuxuser@"$DEPLOY_HOST" \
              '/home/linuxuser/.local/bin/update-trading-system'
